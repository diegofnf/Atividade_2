services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.3}
    container_name: ${POSTGRES_CONTAINER_NAME:-topicos-av2-postgres}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-app_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  postgres_data:
